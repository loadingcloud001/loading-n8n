name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    uses: loadingcloud001/dev-standards/.github/workflows/deploy-template.yml@main
    with:
      service_name: n8n
      service_path: /opt/loading-n8n
      health_url: https://n8n.loadingtechnology.app
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: root
