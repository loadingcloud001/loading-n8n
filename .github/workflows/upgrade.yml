name: Upgrade n8n

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Target n8n version (e.g., 1.93.1)'
        required: true
        type: string
        default: 'latest'
      skip_backup:
        description: 'Skip pre-upgrade database backup'
        required: false
        type: boolean
        default: false

jobs:
  upgrade:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Capture current version for rollback
        id: current
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          CURRENT=$(ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes "$SSH_USER@$SSH_HOST" \
            "docker inspect --format='{{.Config.Image}}' loading-n8n 2>/dev/null | sed 's|n8nio/n8n:||' || echo 'unknown'")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current n8n version: $CURRENT"

      - name: Pre-upgrade database backup
        if: ${{ !inputs.skip_backup }}
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          BACKUP_FILE="/opt/loading-n8n/backups/n8n_pre_upgrade_${TIMESTAMP}.sql"

          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes "$SSH_USER@$SSH_HOST" << ENDSSH
            set -e
            mkdir -p /opt/loading-n8n/backups

            echo "=== Creating pre-upgrade database backup ==="
            echo "Backup file: $BACKUP_FILE"

            # Extract DB connection details from running container
            DB_HOST=\$(docker exec loading-n8n printenv DB_POSTGRESDB_HOST 2>/dev/null || echo '')
            DB_PORT=\$(docker exec loading-n8n printenv DB_POSTGRESDB_PORT 2>/dev/null || echo '25060')
            DB_NAME=\$(docker exec loading-n8n printenv DB_POSTGRESDB_DATABASE 2>/dev/null || echo 'loading_n8n')
            DB_USER=\$(docker exec loading-n8n printenv DB_POSTGRESDB_USER 2>/dev/null || echo 'doadmin')
            DB_PASS=\$(docker exec loading-n8n printenv DB_POSTGRESDB_PASSWORD 2>/dev/null || echo '')

            # pg_dump from within the container (n8n image includes pg_dump)
            docker exec -e PGPASSWORD="\$DB_PASS" loading-n8n \
              pg_dump -h "\$DB_HOST" -p "\$DB_PORT" -U "\$DB_USER" -d "\$DB_NAME" \
              --no-owner --no-acl > "$BACKUP_FILE" 2>&1 || {
                echo "WARNING: pg_dump from container failed, trying host-level pg_dump..."
                PGPASSWORD="\$DB_PASS" pg_dump -h "\$DB_HOST" -p "\$DB_PORT" -U "\$DB_USER" -d "\$DB_NAME" \
                  --no-owner --no-acl > "$BACKUP_FILE"
              }

            echo "Backup size: \$(wc -c < "$BACKUP_FILE") bytes"
            echo "Backup complete: $BACKUP_FILE"

            # Keep only last 10 backups
            ls -1t /opt/loading-n8n/backups/n8n_pre_upgrade_*.sql 2>/dev/null | tail -n +11 | xargs rm -f 2>/dev/null || true
            echo "=== Backup completed ==="
          ENDSSH
          echo "backup_file=backups/n8n_pre_upgrade_${TIMESTAMP}.sql" >> $GITHUB_OUTPUT

      - name: Create .env with target version
        env:
          DO_DB_HOST: ${{ secrets.DO_DB_HOST }}
          DO_DB_PORT: ${{ secrets.DO_DB_PORT }}
          DO_DB_NAME: ${{ secrets.DO_DB_NAME }}
          DO_DB_USER: ${{ secrets.DO_DB_USER }}
          DO_DB_PASSWORD: ${{ secrets.DO_DB_PASSWORD }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          N8N_VERSION: ${{ inputs.version }}
        run: |
          cat > .env << EOF
          DO_DB_HOST=${DO_DB_HOST}
          DO_DB_PORT=${DO_DB_PORT:-25060}
          DO_DB_NAME=${DO_DB_NAME:-loading_n8n}
          DO_DB_USER=${DO_DB_USER:-doadmin}
          DO_DB_PASSWORD=${DO_DB_PASSWORD}
          AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET}
          N8N_VERSION=${N8N_VERSION}
          EOF

      - name: Deploy target version
        id: deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes "$SSH_USER@$SSH_HOST" "mkdir -p /opt/loading-n8n"
          scp -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes docker-compose.yml .env "$SSH_USER@$SSH_HOST:/opt/loading-n8n/"

          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes "$SSH_USER@$SSH_HOST" << 'ENDSSH'
            set -e
            cd /opt/loading-n8n

            echo "=== Pulling new n8n image ==="
            docker-compose pull n8n

            echo "=== Removing old container (compose v1 recreate bug workaround) ==="
            docker-compose down 2>/dev/null || true

            echo "=== Starting n8n with new version ==="
            docker-compose up -d n8n

            echo "=== Container status ==="
            docker-compose ps
          ENDSSH

      - name: Health check with retry
        id: health
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          MAX_RETRIES=10
          RETRY_INTERVAL=6
          SUCCESS=0

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i of $MAX_RETRIES..."

            HTTP_CODE=$(ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes "$SSH_USER@$SSH_HOST" \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:5678/healthz" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check PASSED (HTTP $HTTP_CODE)"
              SUCCESS=1
              break
            fi

            echo "Health check returned HTTP $HTTP_CODE, retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done

          if [ "$SUCCESS" -eq 0 ]; then
            echo "health=failed" >> $GITHUB_OUTPUT
            echo "ERROR: Health check failed after $MAX_RETRIES attempts"
            exit 1
          fi

          echo "health=passed" >> $GITHUB_OUTPUT

      - name: Rollback on failure
        if: failure() && steps.health.outcome == 'failure'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          PREVIOUS_VERSION: ${{ steps.current.outputs.current }}
        run: |
          echo "=== HEALTH CHECK FAILED — INITIATING ROLLBACK ==="
          echo "Rolling back to version: $PREVIOUS_VERSION"

          # Restore previous version in .env
          cat > .env << EOF
          DO_DB_HOST=${{ secrets.DO_DB_HOST }}
          DO_DB_PORT=${{ secrets.DO_DB_PORT }}
          DO_DB_NAME=${{ secrets.DO_DB_NAME }}
          DO_DB_USER=${{ secrets.DO_DB_USER }}
          DO_DB_PASSWORD=${{ secrets.DO_DB_PASSWORD }}
          AUTH0_CLIENT_SECRET=${{ secrets.AUTH0_CLIENT_SECRET }}
          N8N_VERSION=${PREVIOUS_VERSION}
          EOF

          scp -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes docker-compose.yml .env "$SSH_USER@$SSH_HOST:/opt/loading-n8n/"

          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes "$SSH_USER@$SSH_HOST" << 'ENDSSH'
            set -e
            cd /opt/loading-n8n

            echo "=== Stopping failed version ==="
            docker-compose down n8n 2>/dev/null || true

            echo "=== Restarting previous version ==="
            docker-compose pull n8n
            docker-compose up -d n8n

            echo "=== Rollback container status ==="
            docker-compose ps
          ENDSSH

          echo "ROLLBACK COMPLETED. Check /healthz endpoint manually to verify."

      - name: Verify deployment
        if: success()
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes "$SSH_USER@$SSH_HOST" << 'ENDSSH'
            echo "=== Deployed container ==="
            docker ps --filter name=loading-n8n --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "=== Recent logs (last 15 lines) ==="
            docker logs --tail 15 loading-n8n 2>&1 || true
          ENDSSH

      - name: Summary
        if: always()
        run: |
          echo "=== UPGRADE SUMMARY ==="
          echo "Previous version: ${{ steps.current.outputs.current }}"
          echo "Target version:   ${{ inputs.version }}"
          echo "Deploy result:    ${{ steps.deploy.outcome }}"
          echo "Health check:     ${{ steps.health.outcome }}"
          echo "Rollback needed:  ${{ steps.health.outcome == 'failure' && 'YES' || 'NO' }}"
