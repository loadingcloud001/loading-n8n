name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Validate docker compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose syntax
        run: |
          # Create dummy .env for validation if it doesn't exist
          if [ ! -f .env ]; then
            cp .env.example .env 2>/dev/null || touch .env
          fi
          docker compose config --quiet
          echo "docker compose.yml is valid"

  secrets:
    name: Check for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for GitHub tokens
        run: |
          echo "Checking for leaked GitHub tokens..."
          if grep -rE "ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9_]{82}" --include="*.yml" --include="*.yaml" --include="*.json" --include="*.env" --include="*.md" . 2>/dev/null; then
            echo "ERROR: Found potential GitHub token pattern!"
            exit 1
          fi
          echo "No leaked GitHub tokens detected."
